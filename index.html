<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07121f" />
  <title>Puck Rob</title>
  <style>
    :root{
      --bg0:#06101c;
      --bg1:#081a2e;
      --ice:#0e2a44;
      --ice2:#0a2238;
      --text:#e9f3ff;
      --muted:#9fb8d1;
      --red:#ff3b5c;
      --blue:#3aa0ff;
      --gold:#ffd166;
      --green:#31d17a;
      --shadow: rgba(0,0,0,.35);
    }
    html,body{height:100%; margin:0; background: radial-gradient(1200px 900px at 50% 25%, var(--bg1), var(--bg0)); color:var(--text); font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;}
    body{display:flex; align-items:center; justify-content:center;}

    .wrap{width:min(560px, 100vw); padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left)); box-sizing:border-box;}

    .hud{display:flex; gap:10px; align-items:center; justify-content:space-between; margin: 0 0 10px;}
    .hud .left{display:flex; gap:10px; align-items:center;}
    .pill{background: rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.10); box-shadow: 0 10px 30px var(--shadow); border-radius: 999px; padding: 8px 12px; font-weight: 700; letter-spacing:.2px;}
    .pill small{display:block; font-weight:600; color:var(--muted); letter-spacing:.3px;}

    .btn{appearance:none; border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.08); color:var(--text); border-radius: 12px; padding: 10px 12px; font-weight: 800; box-shadow: 0 10px 30px var(--shadow);}
    .btn:active{transform: translateY(1px);}

    canvas{width:100%; height:auto; aspect-ratio: 9/16; border-radius: 18px; border:1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(14,42,68,.8), rgba(10,34,56,.9));
      box-shadow: 0 18px 55px var(--shadow);
      touch-action: none; -webkit-user-select:none; user-select:none;
    }

    .footer{margin-top:10px; color:var(--muted); font-size: 12px; line-height:1.35; display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;}
    .footer b{color:var(--text)}

    .overlay{position:fixed; inset:0; display:none; align-items:center; justify-content:center; padding: 18px; background: rgba(0,0,0,.55); backdrop-filter: blur(6px);}
    .card{width:min(520px, 100%); border-radius: 18px; border:1px solid rgba(255,255,255,.12); background: rgba(10,18,28,.92); box-shadow: 0 18px 60px rgba(0,0,0,.6); padding: 16px;}
    .card h1{margin: 0 0 6px; font-size: 24px; letter-spacing:.2px;}
    .card p{margin: 8px 0; color: var(--muted);}
    .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
    .row .btn{flex:1; min-width: 140px;}
    .hint{font-size: 12px; color: var(--muted);}

    .kbd{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; padding: 2px 6px; border-radius: 8px; border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); color: var(--text);}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hud">
      <div class="left">
        <div class="pill" id="scorePill">Score <small id="score">0</small></div>
        <div class="pill" id="streakPill">Streak <small id="streak">0</small></div>
      </div>
      <button class="btn" id="soundBtn" aria-label="Sound" title="Sound">Sound: Off</button>
      <button class="btn" id="pauseBtn" aria-label="Pause">Pause</button>
    </div>

    <canvas id="c" width="720" height="1280" aria-label="Puck Rob game canvas"></canvas>

    <div class="footer">
      <div><b>How to play:</b> swipe / drag to aim, release to shoot.</div>
      <div><span class="kbd">R</span> restart • <span class="kbd">P</span> pause</div>
    </div>
  </div>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true">
    <div class="card">
      <h1 id="ovTitle">Puck Rob</h1>
      <p id="ovBody">Flick hockey shots past the goalie. Build streaks for bigger points.</p>
      <div class="row" style="margin-top:12px;">
        <button class="btn" id="startBtn">Start</button>
        <button class="btn" id="howBtn">How to play</button>
      </div>
      <p class="hint" id="ovHint" style="margin-top:10px;">Tip: bank shots off the boards. Goalie reads your release.</p>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  const scoreEl = document.getElementById('score');
  const streakEl = document.getElementById('streak');
  const overlay = document.getElementById('overlay');
  const ovTitle = document.getElementById('ovTitle');
  const ovBody = document.getElementById('ovBody');
  const ovHint = document.getElementById('ovHint');
  const startBtn = document.getElementById('startBtn');
  const howBtn = document.getElementById('howBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const soundBtn = document.getElementById('soundBtn');

  // Coordinate system is canvas pixels.
  const W = canvas.width;
  const H = canvas.height;

  // --- Sound (no external files; WebAudio synth SFX) ---
  const sound = {
    enabled: false,
    ctx: null,
    master: null,
  };

  function ensureAudio(){
    if (sound.ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    sound.ctx = new AC();
    sound.master = sound.ctx.createGain();
    sound.master.gain.value = 0.45;
    sound.master.connect(sound.ctx.destination);
  }

  async function unlockAudio(){
    try {
      ensureAudio();
      if (sound.ctx.state !== 'running') await sound.ctx.resume();
    } catch (_) {}
  }

  function setSoundEnabled(v){
    sound.enabled = !!v;
    soundBtn.textContent = sound.enabled ? 'Sound: On' : 'Sound: Off';
    if (sound.enabled) unlockAudio();
  }

  function now(){ return sound.ctx ? sound.ctx.currentTime : 0; }

  function beep({type='sine', f0=440, f1=null, dur=0.08, gain=0.25, attack=0.004, release=0.05} = {}){
    if (!sound.enabled) return;
    ensureAudio();
    const t0 = now() + 0.001;
    const t1 = t0 + dur;

    const osc = sound.ctx.createOscillator();
    const g = sound.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(f0, t0);
    if (f1 != null) osc.frequency.exponentialRampToValueAtTime(Math.max(20, f1), t1);

    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(Math.max(0.0002, gain), t0 + attack);
    g.gain.exponentialRampToValueAtTime(0.0001, t1 + release);

    osc.connect(g);
    g.connect(sound.master);
    osc.start(t0);
    osc.stop(t1 + release);
  }

  function noiseHit({dur=0.06, gain=0.22} = {}){
    if (!sound.enabled) return;
    ensureAudio();
    const t0 = now() + 0.001;
    const t1 = t0 + dur;

    const bufferSize = Math.max(1, Math.floor(sound.ctx.sampleRate * dur));
    const buffer = sound.ctx.createBuffer(1, bufferSize, sound.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i=0;i<bufferSize;i++){
      // quick "tick" noise with decay
      const x = (1 - i/bufferSize);
      data[i] = (Math.random()*2-1) * x;
    }

    const src = sound.ctx.createBufferSource();
    src.buffer = buffer;

    const bp = sound.ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.setValueAtTime(1200, t0);
    bp.Q.setValueAtTime(2.4, t0);

    const g = sound.ctx.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0 + 0.004);
    g.gain.exponentialRampToValueAtTime(0.0001, t1);

    src.connect(bp);
    bp.connect(g);
    g.connect(sound.master);
    src.start(t0);
    src.stop(t1);
  }

  const sfx = {
    shoot(strength=0.6){ beep({type:'triangle', f0:420+240*strength, f1:220, dur:0.07, gain:0.18+0.12*strength}); },
    goal(){ beep({type:'square', f0:660, f1:990, dur:0.10, gain:0.22}); beep({type:'square', f0:990, f1:1320, dur:0.10, gain:0.18}); },
    save(){ noiseHit({dur:0.05, gain:0.22}); beep({type:'sine', f0:220, f1:160, dur:0.08, gain:0.14}); },
    board(){ noiseHit({dur:0.035, gain:0.16}); },
    ui(){ beep({type:'sine', f0:520, f1:640, dur:0.045, gain:0.12}); }
  };

  // Rink dimensions within canvas.
  const rink = { x: W*0.08, y: H*0.08, w: W*0.84, h: H*0.84 };
  const goal = { w: rink.w*0.52, h: rink.h*0.06 };

  // Wingers (teammates) on the boards for one-timers.
  const wingers = {
    r: W*0.030,
    pad: W*0.012,
    yTop: rink.y + rink.h*0.36,
    yBot: rink.y + rink.h*0.76,
    speed: rink.h*0.22, // px/s
    left: { x: rink.x + W*0.050, y: 0, dir: 1, flash: 0 },
    right:{ x: rink.x + rink.w - W*0.050, y: 0, dir: -1, flash: 0 },
  };

  const state = {
    running: false,
    paused: false,
    score: 0,
    streak: 0,
    best: 0,
    shots: 0,
    lastT: 0,
    dt: 0,
    message: null,
    messageT: 0,
  };

  const puck = {
    r: W*0.022,
    x: W*0.5,
    y: rink.y + rink.h*0.82,
    vx: 0,
    vy: 0,
    active: false,
    spin: 0,
    // pass / one-timer
    mode: 'shot', // 'shot'|'pass'
    passTo: null, // 'left'|'right'|null
  };

  const goalie = {
    w: goal.w*0.34,
    h: goal.h*1.6,
    x: W*0.5,
    y: rink.y + goal.h*0.9,
    vx: 0,
    speed: rink.w*0.55, // px/s
    react: 0.16, // seconds before reacting
    reactTimer: 0,
    targetX: W*0.5,
  };

  const aim = {
    dragging: false,
    startX: 0,
    startY: 0,
    curX: 0,
    curY: 0,
    pointerId: null,
    // Fake: hold briefly before release to add deception.
    holdTime: 0,
    lastMoveT: 0,
  };

  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

  function resetRound(){
    puck.x = W*0.5;
    puck.y = rink.y + rink.h*0.82;
    puck.vx = 0; puck.vy = 0;
    puck.active = false;
    puck.spin = 0;

    goalie.x = W*0.5;
    goalie.y = rink.y + goal.h*0.9;
    goalie.vx = 0;
    goalie.reactTimer = 0;
    goalie.targetX = W*0.5;

    // wingers
    wingers.left.y  = rink.y + rink.h*0.62;
    wingers.right.y = rink.y + rink.h*0.62;
    wingers.left.dir = 1;
    wingers.right.dir = -1;
    wingers.left.flash = 0;
    wingers.right.flash = 0;

    aim.dragging = false;
    aim.pointerId = null;

    state.message = null;
  }

  function fullReset(){
    state.score = 0;
    state.streak = 0;
    state.shots = 0;
    state.paused = false;
    pauseBtn.textContent = 'Pause';
    resetRound();
    hud();
  }

  function hud(){
    scoreEl.textContent = String(state.score);
    streakEl.textContent = String(state.streak);
  }

  function showOverlay(title, body, hint, startLabel='Start'){
    ovTitle.textContent = title;
    ovBody.textContent = body;
    ovHint.textContent = hint || '';
    startBtn.textContent = startLabel;
    overlay.style.display = 'flex';
  }

  function hideOverlay(){ overlay.style.display = 'none'; }

  function setMessage(text, seconds=1.1){
    state.message = text;
    state.messageT = seconds;
  }

  function rinkBounds(){
    return {
      left: rink.x,
      right: rink.x + rink.w,
      top: rink.y,
      bottom: rink.y + rink.h,
    };
  }

  function goalMouth(){
    const gx = W*0.5 - goal.w*0.5;
    const gy = rink.y + goal.h*0.35;
    return { x: gx, y: gy, w: goal.w, h: goal.h };
  }

  function shootFromAim(){
    // Convert drag vector into velocity.
    const dx = aim.curX - aim.startX;
    const dy = aim.curY - aim.startY;

    // Require an upward flick (dy negative).
    const power = clamp(Math.hypot(dx, dy), 0, W*0.6);
    if (power < W*0.04){
      setMessage('Flick harder');
      return;
    }

    const dirX = dx / (power || 1);
    const dirY = dy / (power || 1);

    // Bias to forward shots (upwards). If mostly downward, cancel.
    if (dirY > -0.15){
      setMessage('Shoot toward the net');
      return;
    }

    // Decide: shot vs pass.
    // If player flicks strongly sideways (toward boards) and not super upward, treat as pass.
    const sideBias = Math.abs(dirX) - Math.abs(dirY);
    const wantsPass = (Math.abs(dirX) > 0.55 && dirY < -0.20 && sideBias > 0.08);

    puck.mode = wantsPass ? 'pass' : 'shot';
    puck.passTo = wantsPass ? (dirX < 0 ? 'left' : 'right') : null;

    // Speed tuning.
    const base = rink.h * (puck.mode === 'pass' ? 1.05 : 1.35); // px/s
    const v = base * (power / (W*0.6));

    puck.vx = dirX * v;
    puck.vy = dirY * v;
    puck.active = true;

    sfx.shoot(power / (W*0.6));

    // Add a little spin based on lateral component (less on passes)
    puck.spin = clamp(dirX * (puck.mode === 'pass' ? 0.7 : 1.4), -1.2, 1.2);

    // Goalie chooses a read a moment after release.
    goalie.reactTimer = goalie.react;
    goalie.targetX = clamp(puck.x + dirX * goal.w*0.28, W*0.5 - goal.w*0.5 + goalie.w*0.5, W*0.5 + goal.w*0.5 - goalie.w*0.5);

    state.shots++;
  }

  function update(dt){
    if (!state.running || state.paused) return;

    // Message timer
    if (state.messageT > 0){
      state.messageT -= dt;
      if (state.messageT <= 0) state.message = null;
    }

    const b = rinkBounds();
    const g = goalMouth();

    // Goalie AI
    if (puck.active){
      if (goalie.reactTimer > 0){
        goalie.reactTimer -= dt;
      } else {
        // Fake handling: if shooter drags then pauses, goalie bites slightly toward the shown aim.
        // We approximate by using a stored "shown" x (aimCurX) when puck just released.
        const follow = clamp(puck.x + puck.vx*0.08, g.x + goalie.w*0.5, g.x + g.w - goalie.w*0.5);
        goalie.targetX = goalie.targetX*0.65 + follow*0.35;
      }

      const dx = goalie.targetX - goalie.x;
      const maxMove = goalie.speed * dt;
      goalie.x += clamp(dx, -maxMove, maxMove);
      goalie.x = clamp(goalie.x, g.x + goalie.w*0.5, g.x + g.w - goalie.w*0.5);
    }

    // Winger movement (short up/down patterns)
    const moveWinger = (w) => {
      w.y += w.dir * wingers.speed * dt;
      if (w.y < wingers.yTop){ w.y = wingers.yTop; w.dir = 1; }
      if (w.y > wingers.yBot){ w.y = wingers.yBot; w.dir = -1; }
      if (w.flash > 0) w.flash = Math.max(0, w.flash - dt);
    };
    moveWinger(wingers.left);
    moveWinger(wingers.right);

    // Puck physics
    if (puck.active){
      // Magnus-ish curve (tiny)
      puck.vx += puck.spin * 18 * dt;

      puck.x += puck.vx * dt;
      puck.y += puck.vy * dt;

      // Slight friction
      puck.vx *= Math.pow(0.992, dt*60);
      puck.vy *= Math.pow(0.995, dt*60);

      // Side boards: no bounce (use wingers instead). Clamp + damp.
      if (puck.x - puck.r < b.left){
        puck.x = b.left + puck.r;
        puck.vx *= 0.25;
      }
      if (puck.x + puck.r > b.right){
        puck.x = b.right - puck.r;
        puck.vx *= 0.25;
      }

      // Winger one-timer: if puck comes close to a winger while passing, they fire instantly.
      const near = (wx, wy) => Math.hypot(puck.x - wx, puck.y - wy);
      const leftDist = near(wingers.left.x, wingers.left.y);
      const rightDist = near(wingers.right.x, wingers.right.y);
      const hitR = puck.r + wingers.r + wingers.pad;

      if (puck.mode === 'pass' && puck.passTo === 'left' && leftDist < hitR){
        // One-timer shot toward net with a bit of cross-ice angle.
        wingers.left.flash = 0.18;
        puck.mode = 'shot';
        puck.passTo = null;
        // Aim at net center but with a small random bias.
        const g = goalMouth();
        const tx = W*0.5 + (Math.random()*2-1) * (g.w*0.12);
        const ty = g.y + g.h*0.45;
        const ang = Math.atan2(ty - puck.y, tx - puck.x);
        const speed = rink.h * 1.55;
        puck.vx = Math.cos(ang) * speed;
        puck.vy = Math.sin(ang) * speed;
        puck.spin = clamp((tx - W*0.5) / (g.w*0.5), -1, 1);
        sfx.ui();
        setMessage('One-timer!', 0.7);
        goalie.reactTimer = goalie.react * 0.8;
        goalie.targetX = clamp(tx, g.x + goalie.w*0.5, g.x + g.w - goalie.w*0.5);
      }

      if (puck.mode === 'pass' && puck.passTo === 'right' && rightDist < hitR){
        wingers.right.flash = 0.18;
        puck.mode = 'shot';
        puck.passTo = null;
        const g = goalMouth();
        const tx = W*0.5 + (Math.random()*2-1) * (g.w*0.12);
        const ty = g.y + g.h*0.45;
        const ang = Math.atan2(ty - puck.y, tx - puck.x);
        const speed = rink.h * 1.55;
        puck.vx = Math.cos(ang) * speed;
        puck.vy = Math.sin(ang) * speed;
        puck.spin = clamp((tx - W*0.5) / (g.w*0.5), -1, 1);
        sfx.ui();
        setMessage('One-timer!', 0.7);
        goalie.reactTimer = goalie.react * 0.8;
        goalie.targetX = clamp(tx, g.x + goalie.w*0.5, g.x + g.w - goalie.w*0.5);
      }

      // Top boards (behind net) bounce
      if (puck.y - puck.r < b.top){
        puck.y = b.top + puck.r;
        puck.vy *= -0.7;
        sfx.board();
      }

      // Check for save/collision with goalie (simple AABB)
      const goalieRect = { x: goalie.x - goalie.w*0.5, y: goalie.y - goalie.h*0.5, w: goalie.w, h: goalie.h };
      if (
        puck.x + puck.r > goalieRect.x &&
        puck.x - puck.r < goalieRect.x + goalieRect.w &&
        puck.y + puck.r > goalieRect.y &&
        puck.y - puck.r < goalieRect.y + goalieRect.h
      ){
        // Save: reflect puck downward and kill streak.
        puck.vy = Math.abs(puck.vy) * 0.65 + rink.h*0.15;
        puck.vx *= 0.6;
        puck.spin *= 0.25;
        setMessage('Saved!');
        sfx.save();
        state.streak = 0;
        hud();
      }

      // Goal detection: puck crosses goal line within mouth, above goalie zone.
      const goalLineY = g.y + g.h*0.55;
      const inMouth = (puck.x > g.x + puck.r && puck.x < g.x + g.w - puck.r);
      const crossed = (puck.y - puck.r <= goalLineY);
      const pastGoalie = (puck.y + puck.r < goalie.y - goalie.h*0.4);

      if (inMouth && crossed && pastGoalie){
        // Score!
        const points = 1 + Math.floor(state.streak/3);
        state.score += points;
        state.streak += 1;
        state.best = Math.max(state.best, state.streak);
        hud();

        setMessage(points > 1 ? `GOAL! +${points}` : 'GOAL!');
        sfx.goal();

        // New round after a short delay
        puck.active = false;
        setTimeout(() => resetRound(), 420);
      }

      // If puck falls back to bottom => round ends (miss)
      if (puck.y - puck.r > b.bottom){
        puck.active = false;
        if (state.streak > 0) setMessage('Miss — streak reset');
        state.streak = 0;
        hud();
        setTimeout(() => resetRound(), 260);
      }
    }
  }

  function draw(){
    // background
    ctx.clearRect(0,0,W,H);

    // SVG-style gradients (cached each frame; cheap enough at this scale)
    const iceGrad = ctx.createLinearGradient(0, rink.y, 0, rink.y + rink.h);
    iceGrad.addColorStop(0, 'rgba(180,235,255,.16)');
    iceGrad.addColorStop(0.45, 'rgba(210,245,255,.07)');
    iceGrad.addColorStop(1, 'rgba(70,140,200,.10)');

    // Rink
    const rx = rink.x, ry = rink.y, rw = rink.w, rh = rink.h;
    roundRect(rx, ry, rw, rh, 22, iceGrad, 'rgba(255,255,255,.14)');

    // Ice pattern
    ctx.save();
    ctx.beginPath();
    roundedPath(rx, ry, rw, rh, 22);
    ctx.clip();

    // subtle stripes
    for (let i=0;i<18;i++){
      const y = ry + (i/18)*rh;
      ctx.fillStyle = i%2===0 ? 'rgba(255,255,255,.030)' : 'rgba(255,255,255,.012)';
      ctx.fillRect(rx, y, rw, rh/18 + 1);
    }

    // Boards highlight
    ctx.strokeStyle = 'rgba(255,255,255,.10)';
    ctx.lineWidth = 10;
    roundedPath(rx+2, ry+2, rw-4, rh-4, 20);
    ctx.stroke();

    // center line + circles
    ctx.strokeStyle = 'rgba(255,59,92,.42)';
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.moveTo(rx, ry + rh*0.5);
    ctx.lineTo(rx+rw, ry + rh*0.5);
    ctx.stroke();

    // Faceoff circle
    ctx.strokeStyle = 'rgba(58,160,255,.32)';
    ctx.lineWidth = 6;
    circle(W*0.5, ry + rh*0.58, rw*0.12);
    ctx.stroke();

    // Goal
    const g = goalMouth();
    ctx.lineWidth = 4;
    roundRect(g.x, g.y, g.w, g.h, 12, 'rgba(255,255,255,.03)', 'rgba(255,255,255,.22)');

    // Net (simple SVG-ish mesh)
    ctx.save();
    ctx.globalAlpha = 0.14;
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 2;
    for (let i=0;i<=8;i++){
      const xx = g.x + (i/8)*g.w;
      ctx.beginPath();
      ctx.moveTo(xx, g.y);
      ctx.lineTo(xx, g.y + g.h);
      ctx.stroke();
    }
    for (let i=0;i<=4;i++){
      const yy = g.y + (i/4)*g.h;
      ctx.beginPath();
      ctx.moveTo(g.x, yy);
      ctx.lineTo(g.x + g.w, yy);
      ctx.stroke();
    }
    ctx.restore();

    // Crease
    ctx.strokeStyle = 'rgba(58,160,255,.28)';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.arc(W*0.5, g.y + g.h*0.85, g.w*0.24, Math.PI, 0);
    ctx.stroke();

    ctx.restore();

    // Goalie (more graphic)
    const goalieRect = { x: goalie.x - goalie.w*0.5, y: goalie.y - goalie.h*0.5, w: goalie.w, h: goalie.h };
    const padGrad = ctx.createLinearGradient(goalieRect.x, goalieRect.y, goalieRect.x + goalieRect.w, goalieRect.y + goalieRect.h);
    padGrad.addColorStop(0, 'rgba(255,209,102,.95)');
    padGrad.addColorStop(1, 'rgba(255,154,89,.85)');

    roundRect(goalieRect.x, goalieRect.y, goalieRect.w, goalieRect.h, 18, padGrad, 'rgba(0,0,0,.30)');

    // Stick
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,.55)';
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(goalie.x - goalieRect.w*0.12, goalieRect.y + goalieRect.h*0.65);
    ctx.lineTo(goalie.x + goalieRect.w*0.28, goalieRect.y + goalieRect.h*0.80);
    ctx.stroke();
    ctx.restore();

    // Mask
    ctx.fillStyle = 'rgba(6,16,28,.55)';
    circle(goalie.x, goalieRect.y + goalieRect.h*0.36, goalieRect.w*0.20);
    ctx.fill();
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = 'rgba(255,255,255,.9)';
    circle(goalie.x + goalieRect.w*0.06, goalieRect.y + goalieRect.h*0.31, goalieRect.w*0.05);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Puck (with highlight)
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,.82)';
    ctx.strokeStyle = 'rgba(255,255,255,.10)';
    ctx.lineWidth = 2;
    circle(puck.x, puck.y, puck.r);
    ctx.fill();
    ctx.stroke();
    ctx.globalAlpha = 0.22;
    ctx.fillStyle = 'white';
    circle(puck.x - puck.r*0.25, puck.y - puck.r*0.35, puck.r*0.38);
    ctx.fill();
    ctx.restore();

    // Wingers
    drawWinger(wingers.left);
    drawWinger(wingers.right);

    // Aim guide
    if (!puck.active && aim.dragging){
      const dx = aim.curX - aim.startX;
      const dy = aim.curY - aim.startY;
      const mag = Math.hypot(dx, dy);
      const strength = clamp(mag / (W*0.6), 0, 1);

      // Pass vs shot hint
      const dirX = dx/(mag||1);
      const dirY = dy/(mag||1);
      const wantsPass = (Math.abs(dirX) > 0.55 && dirY < -0.20 && (Math.abs(dirX)-Math.abs(dirY)) > 0.08);

      ctx.save();
      ctx.globalAlpha = 0.9;
      ctx.strokeStyle = wantsPass
        ? `rgba(49,209,122,${0.18 + strength*0.60})`
        : `rgba(58,160,255,${0.15 + strength*0.55})`;
      ctx.lineWidth = 10;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(aim.startX, aim.startY);
      ctx.lineTo(aim.curX, aim.curY);
      ctx.stroke();

      // Arrow head
      const ang = Math.atan2(dy, dx);
      const ah = 26;
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.moveTo(aim.curX, aim.curY);
      ctx.lineTo(aim.curX - ah*Math.cos(ang - 0.45), aim.curY - ah*Math.sin(ang - 0.45));
      ctx.moveTo(aim.curX, aim.curY);
      ctx.lineTo(aim.curX - ah*Math.cos(ang + 0.45), aim.curY - ah*Math.sin(ang + 0.45));
      ctx.stroke();

      // Fake indicator: if finger has been still recently, show a subtle pulse
      const heldMs = performance.now() - aim.lastMoveT;
      if (heldMs > 120){
        ctx.globalAlpha = 0.35;
        ctx.fillStyle = 'rgba(255,209,102,.9)';
        circle(aim.curX, aim.curY, 16 + 10*Math.min(1, (heldMs-120)/250));
        ctx.fill();
      }

      ctx.restore();
    }

    // Message
    if (state.message){
      ctx.save();
      ctx.font = '800 40px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(255,255,255,.92)';
      ctx.shadowColor = 'rgba(0,0,0,.35)';
      ctx.shadowBlur = 18;
      ctx.fillText(state.message, W*0.5, rink.y + rink.h*0.12);
      ctx.restore();
    }

    // Pause overlay text
    if (state.paused && state.running){
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,.35)';
      ctx.fillRect(0,0,W,H);
      ctx.fillStyle = 'rgba(233,243,255,.95)';
      ctx.textAlign = 'center';
      ctx.font = '900 56px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
      ctx.fillText('Paused', W*0.5, H*0.5 - 20);
      ctx.font = '700 26px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
      ctx.fillStyle = 'rgba(159,184,209,.95)';
      ctx.fillText('Tap Pause to resume', W*0.5, H*0.5 + 26);
      ctx.restore();
    }

    // Title watermark
    ctx.save();
    ctx.globalAlpha = 0.14;
    ctx.fillStyle = 'white';
    ctx.font = '900 24px system-ui';
    ctx.fillText('PUCK ROB', rink.x + 16, rink.y + 34);
    ctx.restore();
  }

  function circle(x,y,r){
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
  }

  function drawWinger(w){
    // Simple SVG-ish teammate: jersey circle + stick.
    ctx.save();
    const r = wingers.r;
    const base = ctx.createRadialGradient(w.x - r*0.3, w.y - r*0.4, r*0.2, w.x, w.y, r);
    base.addColorStop(0, 'rgba(233,243,255,.95)');
    base.addColorStop(1, 'rgba(58,160,255,.55)');

    circle(w.x, w.y, r);
    ctx.fillStyle = base;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.25)';
    ctx.lineWidth = 3;
    ctx.stroke();

    // Helmet dot
    ctx.fillStyle = 'rgba(6,16,28,.45)';
    circle(w.x, w.y - r*0.25, r*0.22);
    ctx.fill();

    // Stick
    ctx.strokeStyle = 'rgba(255,255,255,.55)';
    ctx.lineWidth = 7;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(w.x - r*0.15, w.y + r*0.35);
    ctx.lineTo(w.x + r*1.05, w.y + r*0.70);
    ctx.stroke();

    // Flash on one-timer
    if (w.flash > 0){
      ctx.globalAlpha = 0.45 * (w.flash/0.18);
      ctx.fillStyle = 'rgba(49,209,122,.9)';
      circle(w.x, w.y, r*1.55);
      ctx.fill();
    }

    ctx.restore();
  }

  function roundedPath(x,y,w,h,r){
    const rr = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+rr, y);
    ctx.arcTo(x+w, y, x+w, y+h, rr);
    ctx.arcTo(x+w, y+h, x, y+h, rr);
    ctx.arcTo(x, y+h, x, y, rr);
    ctx.arcTo(x, y, x+w, y, rr);
    ctx.closePath();
  }

  function roundRect(x,y,w,h,r,fill,stroke){
    roundedPath(x,y,w,h,r);
    if (fill){ ctx.fillStyle = fill; ctx.fill(); }
    if (stroke){ ctx.strokeStyle = stroke; ctx.stroke(); }
  }

  function start(){
    state.running = true;
    state.paused = false;
    pauseBtn.textContent = 'Pause';
    hideOverlay();
    fullReset();
    state.lastT = performance.now();
    requestAnimationFrame(loop);
  }

  function togglePause(){
    if (!state.running) return;
    state.paused = !state.paused;
    pauseBtn.textContent = state.paused ? 'Resume' : 'Pause';
  }

  function loop(t){
    if (!state.running) return;
    const dt = Math.min(0.033, (t - state.lastT) / 1000);
    state.lastT = t;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function canvasPointFromEvent(ev){
    const rect = canvas.getBoundingClientRect();
    const x = (ev.clientX - rect.left) * (W / rect.width);
    const y = (ev.clientY - rect.top) * (H / rect.height);
    return {x,y};
  }

  // Input: Pointer events
  canvas.addEventListener('pointerdown', (ev) => {
    ev.preventDefault();
    if (!state.running || state.paused) return;
    if (puck.active) return;

    canvas.setPointerCapture(ev.pointerId);
    aim.pointerId = ev.pointerId;
    aim.dragging = true;
    aim.holdTime = 0;
    aim.lastMoveT = performance.now();

    const p = canvasPointFromEvent(ev);
    aim.startX = puck.x;
    aim.startY = puck.y;
    aim.curX = p.x;
    aim.curY = p.y;
  }, {passive:false});

  canvas.addEventListener('pointermove', (ev) => {
    if (!aim.dragging || ev.pointerId !== aim.pointerId) return;
    ev.preventDefault();
    const p = canvasPointFromEvent(ev);
    // Clamp aim within rink
    const b = rinkBounds();
    const nx = clamp(p.x, b.left, b.right);
    const ny = clamp(p.y, b.top, b.bottom);

    const moved = Math.hypot(nx - aim.curX, ny - aim.curY) > W*0.004;
    if (moved) aim.lastMoveT = performance.now();

    aim.curX = nx;
    aim.curY = ny;
  }, {passive:false});

  function endDrag(ev){
    if (!aim.dragging || ev.pointerId !== aim.pointerId) return;
    ev.preventDefault();

    // Fake mechanic: if you pause your finger briefly before release, goalie "bites" a bit.
    const heldMs = performance.now() - aim.lastMoveT;
    const didFake = heldMs > 140;

    aim.dragging = false;
    aim.pointerId = null;

    if (didFake){
      const g = goalMouth();
      const shown = clamp(aim.curX, g.x, g.x + g.w);
      goalie.reactTimer = Math.max(0.01, goalie.reactTimer);
      goalie.targetX = goalie.targetX*0.55 + shown*0.45;
      setMessage('Fake!', 0.45);
      sfx.ui();
    }

    shootFromAim();
  }

  canvas.addEventListener('pointerup', endDrag, {passive:false});
  canvas.addEventListener('pointercancel', endDrag, {passive:false});

  // Buttons / keys
  startBtn.addEventListener('click', async () => { await unlockAudio(); sfx.ui(); start(); });
  howBtn.addEventListener('click', async () => {
    await unlockAudio();
    sfx.ui();
    ovTitle.textContent = 'How to play';
    ovBody.textContent = 'Drag to aim. Release to shoot. Score goals past the goalie. Build streaks for bonus points.';
    ovHint.textContent = 'Tip: quick diagonal flicks are harder to read. Bank shots off the boards.';
    startBtn.textContent = 'Play';
  });

  pauseBtn.addEventListener('click', () => {
    if (!state.running){
      showOverlay('Puck Rob', 'Flick hockey shots past the goalie. Build streaks for bigger points.', 'Tip: bank shots off the boards. Goalie reads your release.', 'Start');
      return;
    }
    sfx.ui();
    togglePause();
  });

  soundBtn.addEventListener('click', async () => {
    await unlockAudio();
    setSoundEnabled(!sound.enabled);
    sfx.ui();
  });

  window.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() === 'p') togglePause();
    if (e.key.toLowerCase() === 'r'){
      if (!state.running){ start(); }
      else { fullReset(); }
    }
  });

  // Initial overlay
  showOverlay('Puck Rob', 'Flick hockey shots past the goalie. Build streaks for bigger points.', 'Tip: bank shots off the boards. Goalie reads your release.', 'Start');
  draw();
})();
</script>
</body>
</html>
